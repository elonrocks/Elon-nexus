<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elon Nexus | Connecting the Musk Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .hero { background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)), url('https://picsum.photos/id/1015/2000/1200') center/cover; }
    </style>
</head>
<body class="bg-black text-white">
    <nav class="bg-zinc-950 p-4 sticky top-0">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-orange-500">ELON NEXUS</h1>
            <div class="space-x-6 text-sm">
                <a href="#news" class="hover:text-orange-400">News</a>
                <a href="#shop" class="hover:text-orange-400">Shop</a>
                <a href="#meet" class="hover:text-orange-400">Meet & Greet</a>
            </div>
        </div>
    </nav>

    <header class="hero h-screen flex items-center justify-center text-center px-6">
        <div>
            <h1 class="text-6xl font-bold bg-gradient-to-r from-blue-400 to-orange-500 bg-clip-text text-transparent">ELON NEXUS</h1>
            <p class="text-2xl mt-4">Connecting Fans to Elon Musk</p>
            <div class="mt-10">
                <a href="#news" class="bg-blue-600 px-8 py-4 rounded-full inline-block mx-2">Latest News</a>
                <a href="#shop" class="bg-orange-600 px-8 py-4 rounded-full inline-block mx-2">Shop</a>
            </div>
        </div>
    </header>

    <section id="news" class="py-20 px-6 bg-zinc-950">
        <h2 class="text-4xl font-bold text-center mb-12">Latest Elon Musk News</h2>
        <div class="grid md:grid-cols-3 gap-6 max-w-6xl mx-auto">
            <div class="bg-zinc-900 p-6 rounded-3xl">Starship Flight Progress - June 2026</div>
            <div class="bg-zinc-900 p-6 rounded-3xl">Tesla Robotaxi Update</div>
            <div class="bg-zinc-900 p-6 rounded-3xl">xAI Grok Latest</div>
        </div>
    </section>

    <section id="shop" class="py-20 px-6 bg-black">
        <h2 class="text-4xl font-bold text-center mb-12">Premium Fan Shop</h2>
        <div class="max-w-md mx-auto bg-zinc-900 p-8 rounded-3xl text-center">
            <h3 class="text-2xl">Premium Fan Card</h3>
            <p class="text-5xl font-bold text-orange-500 my-4">$29</p>
            <button onclick="alert('Added to cart! (Demo)')" class="w-full bg-orange-600 py-4 rounded-2xl mt-6">Add to Cart</button>
        </div>
    </section>

    <footer class="py-12 text-center text-gray-500">
        Fan Community • Not affiliated with Elon Musk
    </footer>
</body>
</html>
